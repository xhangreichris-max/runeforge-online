name: Build RuneForge Pages

on:
  push:
    branches:
      - main
    paths:
      - 'pages-config.json'
      - 'template.html'
      - 'build.py'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run build script
        run: python build.py

      - name: Commit and push generated pages
        run: |
          git config --global user.name "RuneForge Builder"
          git config --global user.email "builder@runeforge.online"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-build: generated pages from pages-config.json"
            git push origin main
          fi
